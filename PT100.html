<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pt100 Термокалькулятор | Современный интерфейс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --border-light: rgba(0, 0, 0, 0.08);
            --input-bg: #f7fafc;
            --input-border: #e2e8f0;
            --accent: #5a67d8;
            --accent-hover: #4c51bf;
            --success: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --card-bg: rgba(26, 32, 44, 0.95);
            --text-primary: #edf2f7;
            --text-secondary: #cbd5e0;
            --border-light: rgba(255, 255, 255, 0.1);
            --input-bg: #2d3748;
            --input-border: #4a5568;
            --accent: #9f7aea;
            --accent-hover: #b794f4;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 1.5rem;
            transition: var(--transition);
            color: var(--text-primary);
        }

        /* контейнер */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, #e0e7ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            font-size: 0.85rem;
            opacity: 0.8;
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }
        .icon-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }
        .icon-btn:active {
            transform: translateY(1px);
        }

        /* основная сетка */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.8rem;
        }

        /* карточка ввода */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: var(--shadow-md);
            padding: 1.8rem;
            transition: var(--transition);
            border: 1px solid var(--border-light);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.2);
        }

        .result-preview {
            background: linear-gradient(120deg, rgba(90,103,216,0.1), rgba(118,75,162,0.1));
            border-radius: 1.5rem;
            padding: 1rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .temp-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }
        .temp-unit {
            font-size: 1rem;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-outline:hover {
            background: rgba(90,103,216,0.1);
            border-color: var(--accent);
        }

        /* история в виде карточек */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .history-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .badge {
            background: var(--accent);
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: white;
        }

        .history-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .history-card {
            background: var(--input-bg);
            border-radius: 1.2rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            border: 1px solid var(--border-light);
            animation: fadeSlideUp 0.25s ease-out;
        }
        .history-card:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }
        .history-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .history-sk {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
        }
        .history-resistance {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .history-temp {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1;
        }
        .history-temp small {
            font-size: 0.7rem;
            font-weight: 400;
        }

        .empty-history {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            background: var(--input-bg);
            border-radius: 1.5rem;
        }

        /* скроллбар */
        .history-grid::-webkit-scrollbar {
            width: 5px;
        }
        .history-grid::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }
        .history-grid::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* адаптив */
        @media (max-width: 850px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            body {
                padding: 1rem;
            }
            .temp-value {
                font-size: 2rem;
            }
        }

        /* кнопка темы (в стиле новой визуализации) */
        .theme-toggle-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            color: white;
        }
        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <h1>Pt100 ⚡ Thermo</h1>
            <p>Калькулятор сопротивления → температура</p>
        </div>
        <div class="action-buttons">
            <button class="icon-btn" id="backBtn" onclick="window.location.href='index.html'">← Назад</button>
            <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Тема">🌙</button>
        </div>
    </div>

    <div class="dashboard">
        <!-- Левая панель: ввод -->
        <div class="card">
            <div class="input-group">
                <label>📋 Номер SK (необязательно, только цифры)</label>
                <input type="text" id="skInput" class="input-field" placeholder="например 1245 (можно оставить пустым)" autocomplete="off">
            </div>
            <div class="input-group">
                <label>🔌 Сопротивление (Ω)</label>
                <input type="number" id="resistanceInput" class="input-field" step="0.01" placeholder="100.00">
            </div>

            <div class="result-preview" id="livePreview">
                <div style="font-size:0.8rem; opacity:0.7;">мгновенный расчёт</div>
                <div class="temp-value">--<span class="temp-unit"> °C</span></div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="calcAddBtn">➕ Добавить запись</button>
                <button class="btn-outline" id="clearAllBtn">🗑 Очистить всё</button>
            </div>
            <div class="button-group" style="margin-top: 0.5rem;">
                <button class="btn-outline" id="copyHistoryBtn">📋 Копировать историю</button>
            </div>
        </div>

        <!-- Правая панель: история в современном стиле -->
        <div class="card">
            <div class="history-header">
                <h3>📆 Журнал измерений</h3>
                <span class="badge" id="historyCount">0</span>
            </div>
            <div id="historyContainer" class="history-grid">
                <div class="empty-history">✨ Нет записей. Добавьте первое измерение</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================== ДАННЫЕ ========================
    let measurements = [];  // { sk, resistance, temperature }
    let isDark = false;

    // DOM элементы
    const skInput = document.getElementById('skInput');
    const resistanceInput = document.getElementById('resistanceInput');
    const livePreviewDiv = document.getElementById('livePreview');
    const calcAddBtn = document.getElementById('calcAddBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const copyHistoryBtn = document.getElementById('copyHistoryBtn');
    const historyContainer = document.getElementById('historyContainer');
    const historyCountSpan = document.getElementById('historyCount');
    const themeToggleBtn = document.getElementById('themeToggleBtn');

    // Функция расчёта температуры по сопротивлению (Pt100 линейная)
    function calcTemp(resistance) {
        return (resistance - 100) / 0.385;
    }

    // Обновление мгновенного превью
    function updateLivePreview() {
        const rawRes = resistanceInput.value.trim();
        if (rawRes === "") {
            livePreviewDiv.innerHTML = `
                <div style="font-size:0.8rem; opacity:0.7;">мгновенный расчёт</div>
                <div class="temp-value">--<span class="temp-unit"> °C</span></div>
            `;
            return;
        }
        const res = parseFloat(rawRes);
        if (isNaN(res)) {
            livePreviewDiv.innerHTML = `
                <div style="font-size:0.8rem; opacity:0.7;">некорректное значение</div>
                <div class="temp-value">❌<span class="temp-unit"></span></div>
            `;
            return;
        }
        const temp = calcTemp(res);
        const color = (temp > 200) ? '#ed8936' : (temp < -50 ? '#48bb78' : 'var(--accent)');
        livePreviewDiv.innerHTML = `
            <div style="font-size:0.8rem; opacity:0.7;">мгновенный расчёт</div>
            <div class="temp-value" style="color: ${color};">${temp.toFixed(2)}<span class="temp-unit"> °C</span></div>
        `;
    }

    // Добавление измерения в историю
    function addMeasurement() {
        let skRaw = skInput.value.trim();
        const resistanceRaw = resistanceInput.value.trim();

        // SK необязателен: если введён, проверяем цифры
        let skDisplay = "—";  // значение по умолчанию, если SK не введён
        if (skRaw !== "") {
            if (!/^\d+$/.test(skRaw)) {
                alert("Номер SK может содержать только цифры (если заполнен). Оставьте поле пустым, чтобы записать без имени.");
                return;
            }
            skDisplay = `sk${skRaw}`;
        }

        if (resistanceRaw === "") {
            alert("Введите сопротивление в Омах");
            return;
        }
        const resistance = parseFloat(resistanceRaw);
        if (isNaN(resistance)) {
            alert("Введите корректное числовое сопротивление");
            return;
        }

        const temperature = calcTemp(resistance);
        const roundedTemp = temperature.toFixed(2);
        const roundedRes = resistance.toFixed(2);

        // Добавляем в начало (чтобы новые записи были сверху)
        measurements.unshift({
            sk: skDisplay,
            resistance: roundedRes,
            temperature: roundedTemp,
            rawTemp: temperature,
            timestamp: Date.now()
        });

        // Сохраняем в localStorage
        saveToLocalStorage();
        renderHistory();

        // Очищаем поля, фокус на SK
        skInput.value = '';
        resistanceInput.value = '';
        skInput.focus();

        // анимация успеха (короткая)
        calcAddBtn.style.transform = 'scale(0.97)';
        setTimeout(() => { calcAddBtn.style.transform = ''; }, 150);
    }

    // Рендер истории в виде карточек
    function renderHistory() {
        if (!historyContainer) return;
        if (measurements.length === 0) {
            historyContainer.innerHTML = `<div class="empty-history">📭 Нет записей. Добавьте первое измерение</div>`;
            historyCountSpan.innerText = '0';
            return;
        }
        historyCountSpan.innerText = measurements.length;
        let html = '';
        measurements.forEach((item, idx) => {
            // иконка температуры
            let tempIcon = '🌡️';
            if (item.rawTemp > 200) tempIcon = '🔥';
            else if (item.rawTemp < -30) tempIcon = '❄️';
            html += `
                <div class="history-card" data-idx="${idx}">
                    <div class="history-info">
                        <div class="history-sk">${item.sk}</div>
                        <div class="history-resistance">${item.resistance} Ω</div>
                    </div>
                    <div class="history-temp">
                        ${tempIcon} ${item.temperature}<small>°C</small>
                    </div>
                </div>
            `;
        });
        historyContainer.innerHTML = html;
    }

    // Очистка всей истории
    function clearAllHistory() {
        if (measurements.length === 0) return;
        if (confirm('Удалить все записи из журнала?')) {
            measurements = [];
            saveToLocalStorage();
            renderHistory();
            livePreviewDiv.innerHTML = `
                <div style="font-size:0.8rem; opacity:0.7;">мгновенный расчёт</div>
                <div class="temp-value">--<span class="temp-unit"> °C</span></div>
            `;
        }
    }

    // Копирование данных (таблица с разделителями)
    async function copyHistoryToClipboard() {
        if (measurements.length === 0) {
            alert("Нет данных для копирования");
            return;
        }
        let text = "SK\tСопротивление (Ω)\tТемпература (°C)\n";
        measurements.forEach(item => {
            text += `${item.sk}\t${item.resistance}\t${item.temperature}\n`;
        });
        try {
            await navigator.clipboard.writeText(text);
            // визуальный фидбек
            const originalText = copyHistoryBtn.innerText;
            copyHistoryBtn.innerText = '✅ Скопировано!';
            setTimeout(() => {
                copyHistoryBtn.innerText = originalText;
            }, 1500);
        } catch (err) {
            alert("Не удалось скопировать, попробуйте вручную");
        }
    }

    // Сохранение / загрузка из localStorage
    function saveToLocalStorage() {
        localStorage.setItem('pt100_measurements', JSON.stringify(measurements));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('pt100_measurements');
        if (saved) {
            try {
                measurements = JSON.parse(saved);
                // восстановим rawTemp для иконок (если нет, пересчитаем)
                measurements = measurements.map(m => {
                    if (m.rawTemp === undefined && m.resistance) {
                        const r = parseFloat(m.resistance);
                        if (!isNaN(r)) m.rawTemp = calcTemp(r);
                        else m.rawTemp = 0;
                    }
                    return m;
                });
                renderHistory();
            } catch(e) { console.warn(e); measurements = []; }
        } else {
            measurements = [];
            renderHistory();
        }
    }

    // Тёмная тема: полная смена CSS класса на body и стилизация кнопки
    function initTheme() {
        const storedTheme = localStorage.getItem('pt100_theme');
        if (storedTheme === 'dark') {
            document.body.classList.add('dark');
            isDark = true;
            themeToggleBtn.innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark');
            isDark = false;
            themeToggleBtn.innerHTML = '🌙';
        }
    }

    function toggleTheme() {
        if (isDark) {
            document.body.classList.remove('dark');
            localStorage.setItem('pt100_theme', 'light');
            themeToggleBtn.innerHTML = '🌙';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('pt100_theme', 'dark');
            themeToggleBtn.innerHTML = '☀️';
        }
        isDark = !isDark;
    }

    // Обработка Enter
    function handleEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addMeasurement();
        }
    }

    // Инициализация событий
    function bindEvents() {
        calcAddBtn.addEventListener('click', addMeasurement);
        clearAllBtn.addEventListener('click', clearAllHistory);
        copyHistoryBtn.addEventListener('click', copyHistoryToClipboard);
        resistanceInput.addEventListener('input', updateLivePreview);
        skInput.addEventListener('keypress', handleEnter);
        resistanceInput.addEventListener('keypress', handleEnter);
        themeToggleBtn.addEventListener('click', toggleTheme);
    }

    // Старт
    function init() {
        initTheme();
        loadFromLocalStorage();
        bindEvents();
        updateLivePreview();
        // дополнительно добавим автофокус
        skInput.focus();
    }

    init();
</script>
</body>
</html>
