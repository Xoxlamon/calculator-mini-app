<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор</title>
    <style>
        /* Общие стили для всех элементов */
        * {
            box-sizing: border-box;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }
        
        /* Стили адля body */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #2F3A4C;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Стили для шапки */
        .header {
            display: flex;
            flex-direction: column; /* Выстраиваем ряды вертикально */
            padding: 10px 15px;
            background: #1c1c1e;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        /* Контейнер для рядов кнопок */
        .header-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 8px; /* Отступ между рядами */
        }

        /* Стили для второго ряда (кнопки 1-5) */
        .header-row.second-row {
            justify-content: center; /* Центрируем кнопки 1-5 */
            gap: 8px; /* Расстояние между кнопками */
            margin-top: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333; /* Разделительная линия */
        }

        /* Стили для кнопок в шапке */
        .header-button {
            background: #060c1b;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap; /* Чтобы текст не переносился */
        }

        /* Стили для основного калькулятора */
        .calculator {
            position: fixed;
            top: 110px; /* Увеличил отступ, так как шапка стала выше */
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.5vh;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            margin: 0 auto;
        }

        /* Стили для экрана калькулятора */
        .display {
            color: white;
            font-size: 7.5vh;
            text-align: right;
            padding: 3vh 10px;
            background: #000;
            border: none;
            width: 100%;
            flex-shrink: 0;
        }

        /* Стили для кнопок калькулятора */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5vh;
            flex-grow: 1;
            max-height: 75vh;
            padding: 0.5vh;
            margin-top: 1vh;
        }

        /* Стили для каждой кнопки */
        .button {
            border: none;
            border-radius: 50%;
            font-size: 3.5vh;
            background: #060c1b;
            color: white;
            cursor: pointer;
            transition: filter 0.2s, background-color 0.2s;
            min-width: 0;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 10vh;
            height: 10vh;
            margin: 0.5vh;
        }

        /* Псевдоэлемент для круглых кнопок */
        .button::after {
            content: '';
            display: block;
            padding-bottom: 100%;
        }

        /* Эффект при нажатии на кнопку */
        .button:active {
            filter: brightness(130%);
        }

        /* Стили для операторов (+, -, ×, ÷) */
        .operator {
            background: #ff9f0a;
        }

        /* Стили для специальных кнопок (AC, ±, %) */
        .special {
            background: #a5a5a5;
            color: black;
        }

        /* Стили для кнопки "0" */
        .zero {
            grid-column: span 1;
            border-radius: 50%;
            aspect-ratio: 1;
            justify-content: center;
            padding-left: 0;
            width: 10vh;
            height: 10vh;
            margin: 0.5vh;
        }

        /* Убираем псевдоэлемент для кнопки "0" */
        .zero::after {
            display: none;
        }

        /* Стили для текста внутри кнопок */
        .button span {
            position: absolute;
            pointer-events: none;
        }

        /* Стили для модального окна */
        .info-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .info-modal.active {
            display: flex;
        }

        .info-content {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            position: relative;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-content h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #ff9f0a;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #060c1b;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .info-item:hover {
            background: #1a2440;
        }

        .info-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #ff9f0a;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .info-text strong {
            display: block;
            color: #ff9f0a;
            margin-bottom: 4px;
            font-size: 16px;
        }

        .info-text p {
            margin: 0;
            color: #a5a5a5;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- Шапка с кнопками -->
    <div class="header">
        <!-- Первый ряд: основные функции -->
        <div class="header-row">
            <button class="header-button" onclick="window.location.href='T_MEFIS.html'">T_Mefis</button>
            <button class="header-button" onclick="window.location.href='virus/Kall_Energia.html'">Энер</button>
            <button class="header-button" onclick="window.location.href='AKB.html'">Акум</button>
            <button class="header-button" onclick="window.location.href='PT100.html'">pt100</button>
            <button class="header-button" onclick="window.location.href='ohm-law-calculator.html'">V=I⋅R</button>
        </div>

        <!-- Второй ряд: кнопки 1-5 -->
        <div class="header-row second-row">
            <button class="header-button" onclick="showCalculator()">1</button>
            <button class="header-button" onclick="window.location.href='virus/Kall_Energia.html'">2</button>
            <button class="header-button" onclick="window.location.href='Kalls.html'">3</button>
            <button class="header-button" onclick="window.location.href='PT100.html'">4</button>
            <button class="header-button" onclick="window.location.href='ohm-law-calculator.html'">5</button>
            <button class="header-button" onclick="window.location.href='ONIKS/index.html'">6</button>
            <button class="header-button" onclick="showInfoMenu()" style="background: #ff9f0a;">?</button>
        </div>
    </div>
    
    <!-- Модальное окно с информацией -->
    <div class="info-modal" id="infoModal" onclick="closeInfoMenu(event)">
        <div class="info-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeInfoMenu()">&times;</button>
            <h2>Описание кнопок</h2>
            <div class="info-grid">
                <div class="info-item">
                    <button class="info-button" onclick="showCalculator(); closeInfoMenu()">1</button>
                    <div class="info-text">
                        <strong>Карьера</strong>
                        <p>Расчёт карьерных показателей и достижений</p>
                    </div>
                </div>
                <div class="info-item">
                    <button class="info-button" onclick="window.location.href='virus/Kall_Energia.html'; closeInfoMenu()">2</button>
                    <div class="info-text">
                        <strong>Ремонт</strong>
                        <p>Вставьте сюда свой текст</p>
                    </div>
                </div>
                <div class="info-item">
                    <button class="info-button" onclick="window.location.href='Kalls.html'; closeInfoMenu()">3</button>
                    <div class="info-text">
                        <strong>Болот</strong>
                        <p>Расчёты для болотистой местности</p>
                    </div>
                </div>
                <div class="info-item">
                    <button class="info-button" onclick="window.location.href='PT100.html'; closeInfoMenu()">4</button>
                    <div class="info-text">
                        <strong>Рубильник</strong>
                        <p>Управление рубильником и расчёт нагрузки</p>
                    </div>
                </div>
                <div class="info-item">
                    <button class="info-button" onclick="window.location.href='ohm-law-calculator.html'; closeInfoMenu()">5</button>
                    <div class="info-text">
                        <strong>Кимоно</strong>
                        <p>Расчёт параметров для кимоно вставте сюда свой текст</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Основной калькулятор -->
    <div class="calculator" id="standardCalculator">
        <!-- Экран калькулятора -->
        <input type="text" class="display" id="display" value="0" readonly>
        <!-- Кнопки калькулятора -->
        <div class="buttons">
            <button class="button special" onclick="clearDisplay()"><span>AC</span></button>
            <button class="button special" onclick="toggleSign()"><span>±</span></button>
            <button class="button special" onclick="appendPercentage()"><span>%</span></button>
            <button class="button operator" onclick="appendOperator('÷')"><span>÷</span></button>
            
            <button class="button" onclick="appendNumber('7')"><span>7</span></button>
            <button class="button" onclick="appendNumber('8')"><span>8</span></button>
            <button class="button" onclick="appendNumber('9')"><span>9</span></button>
            <button class="button operator" onclick="appendOperator('×')"><span>×</span></button>
            
            <button class="button" onclick="appendNumber('4')"><span>4</span></button>
            <button class="button" onclick="appendNumber('5')"><span>5</span></button>
            <button class="button" onclick="appendNumber('6')"><span>6</span></button>
            <button class="button operator" onclick="appendOperator('−')"><span>−</span></button>
            
            <button class="button" onclick="appendNumber('1')"><span>1</span></button>
            <button class="button" onclick="appendNumber('2')"><span>2</span></button>
            <button class="button" onclick="appendNumber('3')"><span>3</span></button>
            <button class="button operator" onclick="appendOperator('+')"><span>+</span></button>
            
            <button class="button zero" onclick="appendNumber('0')"><span>0</span></button>
            <button class="button" onclick="appendNumber('00')"><span>00</span></button>
            <button class="button" onclick="appendNumber('.')"><span>.</span></button>
            <button class="button operator" onclick="calculate()"><span>=</span></button>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = null;
        let operation = null;
        
        function updateDisplay() {
            document.getElementById('display').value = currentValue;
        }

        function appendNumber(num) {
            if (currentValue === '0' && num !== '.') {
                currentValue = num;
            } else {
                if (num === '.' && currentValue.includes('.')) return;
                currentValue += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            previousValue = currentValue;
            currentValue = '0';
            operation = op;
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = null;
            operation = null;
            updateDisplay();
        }

        function toggleSign() {
            currentValue = (parseFloat(currentValue) * -1).toString();
            updateDisplay();
        }

        function appendPercentage() {
            currentValue = (parseFloat(currentValue) / 100).toString();
            updateDisplay();
        }

        function calculate() {
            if (!operation || !previousValue) return;
            
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);
            
            switch(operation) {
                case '+':
                    currentValue = (prev + current).toString();
                    break;
                case '−':
                    currentValue = (prev - current).toString();
                    break;
                case '×':
                    currentValue = (prev * current).toString();
                    break;
                case '÷':
                    currentValue = (prev / current).toString();
                    break;
            }
            
            previousValue = null;
            operation = null;
            updateDisplay();
        }

        // Заглушка для функции showCalculator, если она нужна
        function showCalculator() {
            // Здесь можно добавить логику, если нужно
            console.log("Нажата кнопка домой/1");
        }

        // Функции для модального окна с информацией
        function showInfoMenu() {
            document.getElementById('infoModal').classList.add('active');
        }

        function closeInfoMenu(event) {
            if (!event || event.target.id === 'infoModal' || event.target.classList.contains('close-btn')) {
                document.getElementById('infoModal').classList.remove('active');
            }
        }
     </script>
</body>
</html>
