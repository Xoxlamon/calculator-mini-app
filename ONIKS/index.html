<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПСУ-2</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --success: #28a745;
            --success-dark: #218838;
            --zone-6: #4CAF50;
            --zone-6-dark: #45a049;
            --zone-36: #2196F3;
            --zone-36-dark: #1976D2;
            --gray: #666;
            --gray-light: #f8f9fa;
            --border: #ddd;
            --shadow: rgba(0,0,0,0.15);
            --shadow-hover: rgba(0,0,0,0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-top: 80px;
            padding-bottom: 20px;
            line-height: 1.4;
            background: #fff;
            color: #333;
        }

        /* 🔙 Кнопка "Назад" */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: var(--gray);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover {
            background: #555;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--shadow-hover);
        }

        /* 📡 Статус MQTT */
        .mqtt-status {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
        }
        .mqtt-status::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }
        .mqtt-status.connected::before {
            background: var(--success);
            animation: none;
        }
        .mqtt-status.connecting::before {
            background: #ffc107;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        /* 🍔 Выпадающее меню */
        .nav-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .menu-toggle {
            background: var(--gray);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            min-height: 44px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-toggle:hover {
            background: #555;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-hover);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 220px;
            z-index: 999;
            overflow: hidden;
        }

        .nav-container:hover .dropdown-menu,
        .nav-container:focus-within .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: #333;
        }

        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover {
            background: var(--gray);
            color: white;
            padding-left: 24px;
        }

        /* 🔘 Кнопки шкафов */
        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            margin-bottom: 20px;
            padding: 10px 5px;
        }

        .cabinet-btn {
            padding: 12px 8px;
            border: 2px solid var(--border);
            background: white;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 600;
            min-width: 90px;
            max-width: 110px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1 1 auto;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .cabinet-btn:hover {
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
            transform: translateY(-3px);
        }

        .cabinet-btn.type-6_zone {
            background: var(--zone-6);
            color: white;
            border-color: var(--zone-6-dark);
        }

        .cabinet-btn.type-36_zone {
            background: var(--zone-36);
            color: white;
            border-color: var(--zone-36-dark);
        }

        .cabinet-btn.active {
            transform: translateY(-6px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .cabinet-btn.type-6_zone.active {
            box-shadow: 
                0 8px 24px rgba(76, 175, 80, 0.5),
                0 0 0 3px rgba(76, 175, 80, 0.3);
            border-color: var(--zone-6);
        }

        .cabinet-btn.type-36_zone.active {
            box-shadow: 
                0 8px 24px rgba(33, 150, 243, 0.5),
                0 0 0 3px rgba(33, 150, 243, 0.3);
            border-color: var(--zone-36);
        }

        /* 🖼️ Iframe */
        #myFrame {
            width: 100%;
            border: none;
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            min-height: 400px;
            height: calc(100vh - 280px);
            max-height: 1300px;
            background: var(--gray-light);
            transition: height 0.2s ease;
        }

        /* 🪟 Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px;
        }

        .modal-content {
            background: white;
            margin: 20px auto;
            padding: 0;
            width: 100%;
            max-width: 600px;
            max-height: calc(100vh - 40px);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 18px 24px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
        }

        .close {
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .close:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* ⚙️ Настройки шкафов */
        .cabinet-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .cabinet-setting {
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            background: var(--gray-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: box-shadow 0.2s ease;
        }

        .cabinet-setting:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .setting-name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 14px;
            color: #333;
            text-align: center;
            padding: 10px;
            background: rgba(0,123,255,0.08);
            border-radius: 8px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        @media (min-width: 480px) {
            .form-row {
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }
            .form-row label {
                min-width: 55px;
                font-size: 14px;
            }
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            margin: 0;
        }

        input[type="text"],
        select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }

        .show-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }

        .show-row label {
            margin: 0;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            transform: scale(1.4);
            margin: 0;
            accent-color: var(--success);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .save-btn {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(40,167,69,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, var(--success-dark), #1e7e34);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40,167,69,0.4);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        /* 📱 Адаптив */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                padding-top: 140px;
            }

            .back-btn,
            .mqtt-status {
                font-size: 14px;
                padding: 8px 14px;
            }

            .menu-toggle {
                padding: 10px 16px;
                font-size: 15px;
                min-height: 40px;
            }

            .dropdown-menu {
                min-width: 200px;
            }

            .cabinet-btn {
                min-width: 85px;
                max-width: 100px;
                font-size: 14px;
                height: 56px;
                padding: 10px 6px;
            }

            .modal-content {
                margin: 10px auto;
                border-radius: 14px;
                max-height: calc(100vh - 20px);
            }

            .modal-header {
                padding: 16px 20px;
            }

            .modal-title {
                font-size: 18px;
            }

            .modal-body {
                padding: 16px 20px;
            }

            .cabinet-settings {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .cabinet-setting {
                padding: 14px;
            }

            #myFrame {
                height: calc(100vh - 320px);
                border-radius: 16px;
            }
        }

        /* 🖱️ Улучшения для тач-устройств */
        @media (hover: none) {
            .cabinet-btn:hover {
                transform: none;
            }
            .cabinet-btn:active {
                transform: translateY(-2px);
            }
            .menu-toggle:active,
            .save-btn:active {
                transform: scale(0.98);
            }
        }

        /* 🎨 Плавная прокрутка */
        html {
            scroll-behavior: smooth;
        }

        /* 🔍 Скрытие скроллбара для чистоты */
        .modal-body::-webkit-scrollbar,
        body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track,
        body::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-body::-webkit-scrollbar-thumb,
        body::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover,
        body::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.35);
        }
    </style>
</head>
<body>

    <!-- 🔙 Кнопка "Назад" (одна) -->
    <button class="back-btn" onclick="location.href='https://xoxlamon.github.io/calculator-mini-app/'">
        <span>&#8592;</span> Назад
    </button>

    <!-- 📡 Статус MQTT -->
    <div id="mqttStatus" class="mqtt-status connecting">Подключение...</div>

    <!-- 🍔 Меню -->
    <div class="nav-container">
        <button class="menu-toggle" tabindex="0">
            <span>☰</span> Меню
        </button>
        <div class="dropdown-menu">
            <button class="dropdown-item nav-button" onclick="loadContent('/terminal', this)">Терминал</button>
            <button class="dropdown-item nav-button" onclick="openSettingsModal()">Изменить шкафы</button>
            <a class="dropdown-item nav-button" href="/update">Обновить прошивку</a>
        </div>
    </div>

    <!-- 🔘 Контейнер кнопок -->
    <div id="buttonsContainer" class="buttons-container"></div>

    <!-- 🪟 Модальное окно настроек -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title">⚙️ Настройки шкафов</h1>
                <span class="close" onclick="closeSettingsModal()" aria-label="Закрыть">&times;</span>
            </div>
            <div class="modal-body">
                <div id="cabinetSettings" class="cabinet-settings"></div>
                <button class="save-btn" onclick="saveAllChanges()">
                    <span>💾</span> Сохранить в LittleFS
                </button>
            </div>
        </div>
    </div>

    <!-- 🖼️ Iframe для контента -->
    <iframe id="myFrame" src="" title="Контент шкафа">
        <p>Ваш браузер не поддерживает iframe.</p>
    </iframe>

    <script>
        // ================= MQTT НАСТРОЙКИ =================
        const mqttHost = 'wss://m1.wqtt.ru:19157';
        const mqttOptions = {
            connectTimeout: 15000,
            keepalive: 60,
            reconnectPeriod: 3000,
            clientId: 'WebClient_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
            username: 'u_LQAPTV',
            password: 'bC4joft7',
            protocolVersion: 4,
            rejectUnauthorized: false
        };

        let client = null;
        let outTopic = 'ST8';
        let isMqttConnected = false;

        // ================= ИНИЦИАЛИЗАЦИЯ =================
        document.addEventListener('DOMContentLoaded', () => {
            initMQTT();
            loadConfig();
            setupEventListeners();
        });

        function initMQTT() {
            const statusEl = document.getElementById('mqttStatus');
            
            try {
                client = mqtt.connect(mqttHost, mqttOptions);

                client.on('connect', () => {
                    isMqttConnected = true;
                    statusEl.textContent = '● Подключено';
                    statusEl.className = 'mqtt-status connected';
                    client.subscribe(outTopic, { qos: 1 });
                    console.log('✅ MQTT подключён');
                });

                client.on('error', (err) => {
                    isMqttConnected = false;
                    statusEl.textContent = '✕ Ошибка';
                    statusEl.className = 'mqtt-status';
                    console.error('❌ MQTT ошибка:', err);
                });

                client.on('close', () => {
                    isMqttConnected = false;
                    statusEl.textContent = '○ Отключено';
                    statusEl.className = 'mqtt-status';
                    console.log('🔌 MQTT отключён');
                });

                client.on('reconnect', () => {
                    statusEl.textContent = '⟳ Переподключение...';
                    statusEl.className = 'mqtt-status connecting';
                });

                client.on('message', (topic, message) => {
                    const msg = message.toString();
                    const iframe = document.getElementById('myFrame');
                    if (iframe?.contentWindow) {
                        iframe.contentWindow.postMessage(
                            { type: 'mqttMessage', topic, payload: msg }, 
                            '*'
                        );
                    }
                });

            } catch (e) {
                console.error('❌ Не удалось инициализировать MQTT:', e);
                statusEl.textContent = '✕ Ошибка MQTT';
                statusEl.className = 'mqtt-status';
            }
        }

        function reconnectMQTT() {
            if (client) {
                client.end(true, () => {
                    setTimeout(() => initMQTT(), 1000);
                });
            }
        }

        // ================= НАВИГАЦИЯ =================
        function loadContent(url, button) {
            const container = document.getElementById('buttonsContainer');
            container.querySelectorAll('.cabinet-btn').forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');

            const iframe = document.getElementById('myFrame');
            iframe.src = url;
        }

        function newLoadContent(name, type) {
            // Переключаем топик
            if (client && isMqttConnected) {
                client.unsubscribe(outTopic);
                outTopic = "PSU6/" + name;
                client.subscribe(outTopic, { qos: 1 });
            }

            // Формируем URL
            const url = type === "6_zone" ? 'st_6.html' : 'st_36.html';
            const stNumber = name.replace('ST', '');
            const fullUrl = `${url}?st=${stNumber}`;

            const iframe = document.getElementById('myFrame');
            iframe.src = fullUrl;
        }

        // ================= ДАННЫЕ И ОТРИСОВКА =================
        let jsonData = null;
        let displayData = null;

        function loadConfig() {
            // Заглушка данных — замените на fetch('/getConfig') при необходимости
            jsonData = {
                cabinet: [
                    {name:"ST8", type:"6_zone", visible:true},
                    {name:"ST9", type:"6_zone", visible:true},
                    {name:"ST10", type:"36_zone", visible:true},
                    {name:"ST11", type:"36_zone", visible:true},
                    {name:"ST12", type:"36_zone", visible:true},
                    {name:"ST13", type:"6_zone", visible:true}
                ]
            };
            displayData = JSON.parse(JSON.stringify(jsonData));
            displayCabinetButtons();
        }

        function displayCabinetButtons() {
            const container = document.getElementById('buttonsContainer');
            container.innerHTML = '';

            displayData.cabinet.forEach(cabinet => {
                if (!cabinet.visible) return;

                const btn = document.createElement('button');
                btn.className = `cabinet-btn type-${cabinet.type}`;
                btn.textContent = cabinet.name;
                btn.type = 'button';
                btn.setAttribute('aria-label', `Выбрать шкаф ${cabinet.name}`);

                btn.addEventListener('click', function() {
                    newLoadContent(cabinet.name, cabinet.type);
                    container.querySelectorAll('.cabinet-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });

                container.appendChild(btn);
            });
        }

        // ================= МОДАЛЬНОЕ ОКНО =================
        function openSettingsModal() {
            if (jsonData) {
                renderSettingsForm();
                document.getElementById('settingsModal').style.display = 'block';
                document.body.style.overflow = 'hidden'; // Блокируем прокрутку фона
            }
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function renderSettingsForm() {
            const container = document.getElementById('cabinetSettings');
            container.innerHTML = '';

            jsonData.cabinet.forEach((cabinet, index) => {
                const setting = document.createElement('div');
                setting.className = 'cabinet-setting';
                setting.dataset.index = index;
                setting.innerHTML = `
                    <div class="setting-name">${escapeHtml(cabinet.name)}</div>
                    <div class="form-row">
                        <label for="name-${index}">Name:</label>
                        <input type="text" id="name-${index}" class="form-input" value="${escapeHtml(cabinet.name)}" maxlength="20">
                    </div>
                    <div class="form-row">
                        <label for="type-${index}">Тип:</label>
                        <select id="type-${index}" class="form-input">
                            <option value="6_zone" ${cabinet.type === '6_zone' ? 'selected' : ''}>6 зон</option>
                            <option value="36_zone" ${cabinet.type === '36_zone' ? 'selected' : ''}>36 зон</option>
                        </select>
                    </div>
                    <div class="show-row">
                        <input type="checkbox" id="visible-${index}" class="form-input" ${cabinet.visible ? 'checked' : ''}>
                        <label for="visible-${index}">Показывать</label>
                    </div>
                `;
                container.appendChild(setting);
            });
        }

        // ================= СОХРАНЕНИЕ =================
        async function saveAllChanges() {
            const settings = document.querySelectorAll('.cabinet-setting');
            
            settings.forEach(setting => {
                const index = parseInt(setting.dataset.index);
                const nameInput = setting.querySelector(`#name-${index}`);
                const typeSelect = setting.querySelector(`#type-${index}`);
                const visibleCheck = setting.querySelector(`#visible-${index}`);
                
                if (jsonData.cabinet[index]) {
                    jsonData.cabinet[index].name = nameInput?.value.trim() || jsonData.cabinet[index].name;
                    jsonData.cabinet[index].type = typeSelect?.value || jsonData.cabinet[index].type;
                    jsonData.cabinet[index].visible = visibleCheck?.checked ?? false;
                }
            });

            try {
                const response = await fetch('/saveConfig', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(jsonData),
                    timeout: 10000
                });

                if (response.ok) {
                    displayData = JSON.parse(JSON.stringify(jsonData));
                    displayCabinetButtons();
                    closeSettingsModal();
                    showTemporaryMessage('✅ Настройки сохранены!', 'success');
                    console.log('💾 Шкафы сохранены в LittleFS');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('❌ Ошибка сохранения:', error);
                showTemporaryMessage('❌ Ошибка сохранения!', 'error');
            }
        }

        // ================= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =================
        function setupEventListeners() {
            // Закрытие модального окна по клику вне контента
            document.getElementById('settingsModal').addEventListener('click', (e) => {
                if (e.target.id === 'settingsModal') closeSettingsModal();
            });

            // Закрытие по Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeSettingsModal();
            });

            // Предотвращение всплытия клика внутри модального окна
            document.querySelector('.modal-content')?.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // Улучшенная поддержка тач-событий для меню
            const menuToggle = document.querySelector('.menu-toggle');
            const navContainer = document.querySelector('.nav-container');
            
            menuToggle?.addEventListener('touchstart', (e) => {
                e.stopPropagation();
            }, {passive: true});
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTemporaryMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.textContent = text;
            msg.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: ${type === 'success' ? 'var(--success)' : type === 'error' ? '#dc3545' : 'var(--primary)'};
                color: white;
                border-radius: 10px;
                font-weight: 500;
                font-size: 14px;
                z-index: 3000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            `;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // Добавляем CSS-анимации динамически
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from { opacity: 0; transform: translate(-50%, 20px); }
                to { opacity: 1; transform: translate(-50%, 0); }
            }
            @keyframes fadeOut {
                to { opacity: 0; transform: translate(-50%, -10px); }
            }
        `;
        document.head.appendChild(style);

        // ================= ОБРАБОТКА РАЗМЕРА IFRAME =================
        function updateIframeHeight() {
            const iframe = document.getElementById('myFrame');
            const headerHeight = 140; // Приблизительная высота шапки
            const footerPadding = 40;
            const availableHeight = window.innerHeight - headerHeight - footerPadding;
            
            iframe.style.height = Math.max(400, Math.min(availableHeight, 1300)) + 'px';
        }

        window.addEventListener('resize', updateIframeHeight);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateIframeHeight, 300);
        });

        // Инициализация высоты при загрузке
        setTimeout(updateIframeHeight, 100);
    </script>
</body>
</html>
