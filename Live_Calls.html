
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор температуры Pt100</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #ddd;
            --input-bg: #ffffff;
            --input-border: #ccc;
            --button-calc: #007bff;
            --button-clear: #dc3545;
            --button-copy: #28a745;
            --button-hover-calc: #0069d9;
            --button-hover-clear: #c82333;
            --button-hover-copy: #218838;
            --table-header-bg: #f5f5f5;
            --shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .dark-theme {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444;
            --input-bg: #2c2c2c;
            --input-border: #555;
            --table-header-bg: #2a2a2a;
            --shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .calculator {
            width: 100%;
            max-width: 450px;
            margin: 20px auto;
            padding: 15px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: var(--shadow);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        h2, h3 {
            color: var(--text-color);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            height: 40px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        button {
            width: 48%;
            height: 40px;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #calculate-btn {
            background-color: var(--button-calc);
        }
        #calculate-btn:hover {
            background-color: var(--button-hover-calc);
        }

        #clear-btn {
            background-color: var(--button-clear);
        }
        #clear-btn:hover {
            background-color: var(--button-hover-clear);
        }

        #copy-btn {
            background-color: var(--button-copy);
        }
        #copy-btn:hover {
            background-color: var(--button-hover-copy);
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        #result {
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            word-wrap: break-word;
            color: var(--text-color);
        }

        #history {
            margin-top: 30px;
        }

        #history h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        #history-list {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            color: var(--text-color);
        }

        #history-list th,
        #history-list td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
            transition: border-color 0.2s;
        }

        #history-list th {
            background-color: var(--table-header-bg);
        }

        .temp-cell {
            font-weight: bold;
        }

        /* Прозрачная кнопка темы — в самом правом верхнем углу экрана */
        #theme-toggle {
            position: fixed;
            top: 0;
            right: 0;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 18px;
            cursor: pointer;
            padding: 6px 8px;
            z-index: 9999;
            outline: none;
            line-height: 1;
            margin: 0;
        }

        #theme-toggle:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- КНОПКА ТЕМЫ — ДОЛЖНА БЫТЬ ЗДЕСЬ, НА УРОВНЕ BODY -->
    <button id="theme-toggle" onclick="toggleTheme()">🌙</button>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="calculator">
        <h2>Калькулятор температуры Pt100</h2>
        <label for="skNumber">Номер SK :</label>
        <input type="number" id="skNumber" placeholder="Введите №SK" min="0" step="1">
        <label for="resistance">Сопротивление (Ω):</label>
        <input type="number" id="resistance" value="" step="0.01">
        <button id="calculate-btn" onclick="calculateAndAdd()">Рассчитать</button>
        <div id="result"></div>

        <div class="button-container">
            <button id="clear-btn" onclick="clearData()">Очистить данные</button>
            <button id="copy-btn" onclick="copyData()">Скопировать данные</button>
        </div>

        <div id="history">
            <h3>История измерений</h3>
            <table id="history-list">
                <thead>
                    <tr>
                        <th>SK</th>
                        <th>Сопротивление (Ω)</th>
                        <th>Температура (°C)</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let history = [];
        let isDarkMode = false;

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-theme');
            isDarkMode = true;
            document.getElementById('theme-toggle').textContent = '☀️';
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-theme', isDarkMode);
            localStorage.setItem('darkMode', isDarkMode);

            const toggleBtn = document.getElementById('theme-toggle');
            toggleBtn.textContent = isDarkMode ? '☀️' : '🌙';
        }

        function calculateTemperature(resistance) {
            return (resistance - 100) / 0.385;
        }

        function calculateAndAdd() {
            let skNumber = document.getElementById('skNumber').value.trim();
            let resistance = parseFloat(document.getElementById('resistance').value);

            if (!skNumber) {
                alert("Введите номер ТЭНа (цифры после 'sk')");
                return;
            }

            if (!/^\d+$/.test(skNumber)) {
                alert("Номер ТЭНа должен содержать только цифры");
                return;
            }

            if (isNaN(resistance)) {
                alert("Введите корректное значение сопротивления");
                return;
            }

            let sk = 'sk' + skNumber;
            let temperature = calculateTemperature(resistance);
            let roundedTemp = temperature.toFixed(2);
            let roundedResistance = resistance.toFixed(2);

            history.push({ sk, resistance: roundedResistance, temperature: roundedTemp });
            updateHistoryTable();
            document.getElementById('result').innerText = `Рассчитанная температура: ${roundedTemp} °C`;

            document.getElementById('skNumber').value = '';
            document.getElementById('resistance').value = '';
            document.getElementById('skNumber').focus();
        }

        function updateHistoryTable() {
            const tbody = document.querySelector('#history-list tbody');
            tbody.innerHTML = '';

            history.forEach(item => {
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.sk}</td>
                    <td>${item.resistance}</td>
                    <td class="temp-cell">${item.temperature}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function clearData() {
            history = [];
            updateHistoryTable();
            document.getElementById('result').innerText = '';
            document.getElementById('skNumber').value = '';
            document.getElementById('resistance').value = '';
        }

        function copyData() {
            if (history.length === 0) {
                alert("Нет данных для копирования");
                return;
            }

            let text = "SK\tСопротивление (Ω)\tТемпература (°C)\n";
            history.forEach(item => {
                text += `${item.sk}\t${item.resistance}\t${item.temperature}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                alert("Данные скопированы в буфер обмена");
            }).catch(err => {
                console.error('Ошибка при копировании: ', err);
                alert("Не удалось скопировать. Попробуйте вручную.");
            });
        }
    </script>
</body>
</html>
